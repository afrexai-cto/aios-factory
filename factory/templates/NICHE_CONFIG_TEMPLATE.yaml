# Niche Configuration
# This file defines the vertical-specific settings for an AIOS workspace.
# Generated by AIOS Factory — edit as needed for your specific business.

niche:
  # Display name for the vertical
  name: "{{VERTICAL_NAME}}"

  # URL-safe identifier (lowercase, hyphens)
  slug: "{{VERTICAL_SLUG}}"

  # One-line description of the vertical
  description: "{{VERTICAL_DESCRIPTION}}"

  # Target geography (affects compliance and terminology)
  geography: "{{GEOGRAPHY}}"

  # Typical business size range
  business_size: "{{BUSINESS_SIZE}}"

# Terminology Mapping
# Maps the 10 universal AIOS terms to this vertical's language.
# These terms are used throughout the workspace for consistency.
terminology:
  case: "{{TERM_CASE}}"           # Primary unit of work
  client: "{{TERM_CLIENT}}"       # Who submits/receives work
  document: "{{TERM_DOCUMENT}}"   # Files and records
  workflow: "{{TERM_WORKFLOW}}"   # Sequence of steps
  intake: "{{TERM_INTAKE}}"       # How new work arrives
  outcome: "{{TERM_OUTCOME}}"     # Final result delivered
  provider: "{{TERM_PROVIDER}}"   # Professional doing the work
  status: "{{TERM_STATUS}}"       # Current state of work
  report: "{{TERM_REPORT}}"       # Structured output document
  invoice: "{{TERM_INVOICE}}"     # Financial record

# Core Workflows
# The main operational processes this business performs.
# Each workflow becomes a skill in the generated workspace.
workflows:
  - name: "{{WORKFLOW_1_NAME}}"
    trigger: "{{WORKFLOW_1_TRIGGER}}"
    steps:
      - "{{STEP_1}}"
      - "{{STEP_2}}"
      - "{{STEP_3}}"
    output: "{{WORKFLOW_1_OUTPUT}}"
    ai_opportunity: "{{WORKFLOW_1_AI}}"

  - name: "{{WORKFLOW_2_NAME}}"
    trigger: "{{WORKFLOW_2_TRIGGER}}"
    steps:
      - "{{STEP_1}}"
      - "{{STEP_2}}"
      - "{{STEP_3}}"
    output: "{{WORKFLOW_2_OUTPUT}}"
    ai_opportunity: "{{WORKFLOW_2_AI}}"

  - name: "{{WORKFLOW_3_NAME}}"
    trigger: "{{WORKFLOW_3_TRIGGER}}"
    steps:
      - "{{STEP_1}}"
      - "{{STEP_2}}"
      - "{{STEP_3}}"
    output: "{{WORKFLOW_3_OUTPUT}}"
    ai_opportunity: "{{WORKFLOW_3_AI}}"

# Pain Points
# Problems this vertical experiences that an AIOS can address.
pain_points:
  - name: "{{PAIN_1_NAME}}"
    description: "{{PAIN_1_DESCRIPTION}}"
    frequency: "{{PAIN_1_FREQUENCY}}"
    current_solution: "{{PAIN_1_CURRENT}}"
    ai_solution: "{{PAIN_1_AI}}"

  - name: "{{PAIN_2_NAME}}"
    description: "{{PAIN_2_DESCRIPTION}}"
    frequency: "{{PAIN_2_FREQUENCY}}"
    current_solution: "{{PAIN_2_CURRENT}}"
    ai_solution: "{{PAIN_2_AI}}"

# Five Elements Mapping
# How this vertical maps to the universal architecture.
five_elements:
  intake: "{{E1_DESCRIPTION}}"
  processing: "{{E2_DESCRIPTION}}"
  output: "{{E3_DESCRIPTION}}"
  tracking: "{{E4_DESCRIPTION}}"
  deployment: "{{E5_DESCRIPTION}}"

# Integrations
# Common tools used by businesses in this vertical.
integrations:
  - name: "{{INTEGRATION_1}}"
    purpose: "{{INTEGRATION_1_PURPOSE}}"
    mcp_available: true  # Whether an MCP server exists

  - name: "{{INTEGRATION_2}}"
    purpose: "{{INTEGRATION_2_PURPOSE}}"
    mcp_available: true

# Compliance (if applicable)
compliance:
  primary_regulator: "{{REGULATOR}}"
  key_obligations:
    - "{{OBLIGATION_1}}"
    - "{{OBLIGATION_2}}"
  data_sensitivity: "{{DATA_SENSITIVITY}}"  # low / medium / high
